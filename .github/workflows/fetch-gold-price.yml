name: gold-price-fetch-update

on:
  schedule:
    - cron: '0 1 * * *' # Every day at 01:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-gold:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create directory
        run: mkdir -p api/alphavantage

      - name: Fetch gold data
        continue-on-error: true
        run: |
          fetch_alpha_vantage() {
            local label="$1"
            local url="$2"
            local output="$3"
            local tmp="${output}.tmp"

            rm -f "$tmp"

            if ! curl --request GET \
              --url "$url" \
              --header 'accept: application/json' \
              --fail \
              -o "$tmp"; then
              echo "::warning::Failed to fetch ${label}; keeping existing ${output}"
              rm -f "$tmp"
              return 0
            fi

            if ! jq empty "$tmp" >/dev/null 2>&1; then
              echo "::warning::Invalid JSON returned for ${label}; keeping existing ${output}"
              rm -f "$tmp"
              return 0
            fi

            if jq -e 'type == "object" and (has("Information") or has("Note") or has("Error Message"))' "$tmp" >/dev/null; then
              echo "::warning::Alpha Vantage returned a throttling/error payload for ${label}; keeping existing ${output}"
              jq -r '.Information // .Note // ."Error Message"' "$tmp"
              rm -f "$tmp"
              return 0
            fi

            mv "$tmp" "$output"
          }

          fetch_alpha_vantage \
            "gold spot" \
            "https://www.alphavantage.co/query?function=GOLD_SILVER_SPOT&symbol=GOLD&apikey=${{ secrets.ALPHAVANTAGE_API_KEY }}" \
            "api/alphavantage/gold-spot.json"

          sleep 2

          fetch_alpha_vantage \
            "gold history" \
            "https://www.alphavantage.co/query?function=GOLD_SILVER_HISTORY&symbol=GOLD&interval=daily&apikey=${{ secrets.ALPHAVANTAGE_API_KEY }}" \
            "api/alphavantage/gold-history.json"

      - name: Trim gold history to latest three calendar years
        run: |
          history_file="api/alphavantage/gold-history.json"
          tmp="${history_file}.tmp"
          current_year="$(date -u +'%Y')"
          min_year=$((current_year - 2))

          if [ ! -f "$history_file" ]; then
            echo "::warning::${history_file} does not exist; skipping history trim"
            exit 0
          fi

          if ! jq \
            --argjson min_year "$min_year" \
            --argjson current_year "$current_year" \
            '
              if type == "object" and (.data | type == "array") then
                .data |= map(
                  select(
                    (.date | type == "string")
                    and (.date | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}$"))
                    and ((.date[0:4] | tonumber) >= $min_year)
                    and ((.date[0:4] | tonumber) <= $current_year)
                  )
                )
              else
                .
              end
            ' "$history_file" > "$tmp"; then
            echo "::warning::Failed to trim ${history_file}; keeping existing file"
            rm -f "$tmp"
            exit 0
          fi

          mv "$tmp" "$history_file"
          echo "Kept gold history rows from ${min_year} through ${current_year}."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A api/alphavantage
          git diff --cached --quiet || git commit -m "Update gold data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
