name: gold-price-fetch-update

on:
  schedule:
    - cron: '0 1 * * *' # Every day at 01:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-gold:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create directory
        run: mkdir -p api/alphavantage

      - name: Fetch gold spot price
        continue-on-error: true
        run: |
          curl --request GET \
            --url "https://www.alphavantage.co/query?function=GOLD_SILVER_SPOT&symbol=GOLD&apikey=${{ secrets.ALPHAVANTAGE_API_KEY }}" \
            --header 'accept: application/json' \
            --fail \
            -o api/alphavantage/gold.json.tmp \
          && mv api/alphavantage/gold.json.tmp api/alphavantage/gold.json \
          || rm -f api/alphavantage/gold.json.tmp

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/alphavantage/gold.json
          git diff --cached --quiet || git commit -m "Update gold price $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
